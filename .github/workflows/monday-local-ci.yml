name: Monday Local CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  monday-local-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -r requirements-dev.txt

      - name: Validate handoff mapping smoke
        run: |
          mkdir -p /tmp/monday
          python3 scripts/validate_handoff_mapping.py \
            --run-id "ci-${{ github.run_id }}-handoff" \
            --output /tmp/monday/handoff-smoke-report.json
          python3 scripts/validate_runtime_evidence.py \
            --kind handoff \
            --report /tmp/monday/handoff-smoke-report.json \
            --output /tmp/monday/handoff-validation-report.json

      - name: Run planningops handoff integration smoke
        run: |
          mkdir -p /tmp/monday
          python3 scripts/integrate_planningops_handoff.py \
            --run-id "ci-${{ github.run_id }}" \
            --handoff-report /tmp/monday/handoff-smoke-report.json \
            --queue-out /tmp/monday/queue.from-planningops.json \
            --scheduler-report /tmp/monday/scheduler-run-report.json \
            --integration-report /tmp/monday/planningops-handoff-report.json \
            --idempotency /tmp/monday/idempotency.json \
            --transition-log /tmp/monday/scheduler.ndjson
          python3 scripts/validate_runtime_evidence.py \
            --kind scheduler \
            --report /tmp/monday/scheduler-run-report.json \
            --output /tmp/monday/scheduler-validation-report.json
          python3 scripts/validate_runtime_evidence.py \
            --kind integration \
            --report /tmp/monday/planningops-handoff-report.json \
            --output /tmp/monday/integration-validation-report.json

      - name: Validate contract pin
        run: |
          mkdir -p /tmp/monday
          python3 scripts/validate_contract_pin.py \
            --output /tmp/monday/contract-pin-report.json

      - name: Seeded failure guard for contract pin
        run: bash scripts/test_contract_pin_validation.sh
